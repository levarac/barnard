name: Native SDK CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  swift-package:
    # Flutter-free: builds/tests packages/swift/barnard directly. No Flutter
    # toolchain is installed in this job (barnard#56 acceptance criterion:
    # "CI validates each first-class SDK surface independently").
    runs-on: macos-15
    defaults:
      run:
        working-directory: packages/swift/barnard
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Resolve simulator destination
        id: destination
        run: |
          UDID=$(xcrun simctl list devices available iOS -j | \
            python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; \
            runtimes=[k for k in d if 'iOS' in k]; \
            runtimes.sort(reverse=True); \
            devices=[dev for rt in runtimes for dev in d[rt] if 'iPhone' in dev['name']]; \
            print(devices[0]['udid'])")
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
      - name: swift build (package graph sanity check)
        run: xcodebuild -scheme Barnard -destination "id=${{ steps.destination.outputs.udid }}" build
      - name: BarnardCore stdlib-only build and purity check
        run: |
          swift build --target BarnardCore
          swift build --target BarnardCoreC
          if grep -RnwE \
            'Foundation|FoundationEssentials|CryptoKit|CoreBluetooth|Security|UIKit|CommonCrypto|SecRandom|UserDefaults|Data|Date|CCCrypt' \
            Sources/BarnardCore Sources/BarnardCoreC; then
            echo "BarnardCore contains a forbidden platform dependency"
            exit 1
          fi
      - name: swift test (Barnard compatibility + BarnardCore unit tests)
        run: xcodebuild -scheme Barnard-Package -destination "id=${{ steps.destination.outputs.udid }}" test
      - name: Root and inner Swift package manifest drift guard
        working-directory: .
        run: ./scripts/check-swift-package-manifest-mirror.sh
      - name: Scratch consumer builds for iOS Simulator and imports Barnard
        working-directory: .
        run: |
          consumer_dir="$(mktemp -d)"
          mkdir -p "$consumer_dir/Sources/BarnardConsumer"
          cat > "$consumer_dir/Package.swift" <<EOF
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "BarnardConsumer",
              dependencies: [
                  .package(name: "barnard", path: "$GITHUB_WORKSPACE")
              ],
              targets: [
                  .executableTarget(
                      name: "BarnardConsumer",
                      dependencies: [
                          .product(name: "Barnard", package: "barnard")
                      ]
                  )
              ]
          )
          EOF
          cat > "$consumer_dir/Sources/BarnardConsumer/main.swift" <<'EOF'
          import Barnard

          print("Barnard import succeeded")
          EOF
          swift build \
            --package-path "$consumer_dir" \
            --triple arm64-apple-ios15.0-simulator \
            --sdk "$(xcrun --sdk iphonesimulator --show-sdk-path)"

  swift-mirror-sync-check:
    # packages/swift/barnard mirrors the Flutter-free platform adapters and
    # BarnardCore sources under packages/dart/barnard/ios; this guards against
    # drift (see scripts/check-swift-mirror.sh).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-swift-mirror.sh

  ios-native-example:
    runs-on: macos-15
    defaults:
      run:
        working-directory: examples/ios-native
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Resolve simulator destination
        id: destination
        run: |
          UDID=$(xcrun simctl list devices available iOS -j | \
            python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; \
            runtimes=[k for k in d if 'iOS' in k]; \
            runtimes.sort(reverse=True); \
            devices=[dev for rt in runtimes for dev in d[rt] if 'iPhone' in dev['name']]; \
            print(devices[0]['udid'])")
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
      - name: Build native iOS example (Flutter-free)
        run: |
          xcodebuild -project BarnardNativeExample.xcodeproj -scheme BarnardNativeExample \
            -destination "id=${{ steps.destination.outputs.udid }}" build

  android-library:
    # Flutter-free: builds/tests packages/android/barnard directly. No
    # Flutter or React Native toolchain is installed in this job (barnard#56
    # acceptance criterion: "CI validates each first-class SDK surface
    # independently").
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/android/barnard
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: gradle build (library sanity check)
        run: ./gradlew assembleDebug assembleRelease
      - name: gradle test (crypto/TEK/RPID + signing + engine/identity unit tests)
        run: ./gradlew test

  android-mirror-sync-check:
    # packages/android/barnard mirrors the Flutter-free crypto/signing/RPID
    # sources under packages/dart/barnard/android; this guards against drift
    # (see scripts/check-android-mirror.sh).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-android-mirror.sh

  android-native-example:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/android-native
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Check device-lab host script syntax
        run: bash -n device-lab/run_two_device_loop.sh
      - name: Build native Android example and device-lab test APKs (Flutter-free)
        run: ./gradlew assembleDebug assembleDebugAndroidTest
