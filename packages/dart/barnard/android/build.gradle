group = "network.greeting.barnard"
version = "1.0-SNAPSHOT"

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { stream ->
        localProperties.load(stream)
    }
}

def detectFlutterSdkPath = {
    def output = new ByteArrayOutputStream()
    def result = exec {
        commandLine("flutter", "--version", "--machine")
        standardOutput = output
        errorOutput = new ByteArrayOutputStream()
        ignoreExitValue = true
    }
    if (result.exitValue != 0) {
        return null
    }

    def matcher = output.toString("UTF-8") =~ /"flutterRoot"\s*:\s*"([^"]+)"/
    return matcher.find() ? matcher.group(1).replace("\\/", "/") : null
}

def flutterSdkCandidates = [
    project.findProperty("flutter.sdk"),
    System.getenv("FLUTTER_ROOT"),
    localProperties.getProperty("flutter.sdk"),
    detectFlutterSdkPath(),
].findAll { it != null && it.toString().trim() != "" }
def flutterSdkPath = flutterSdkCandidates.find {
    file("$it/bin/cache/artifacts/engine/android-arm64/flutter.jar").exists()
}
def flutterEmbeddingJar = flutterSdkPath == null ? null : file("$flutterSdkPath/bin/cache/artifacts/engine/android-arm64/flutter.jar")

buildscript {
    ext.kotlin_version = "2.2.20"
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.11.1")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

android {
    namespace = "network.greeting.barnard"

    compileSdk = 36

    buildFeatures {
        buildConfig = true
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
        test.java.srcDirs += "src/test/kotlin"
    }

    defaultConfig {
        minSdk = 24
    }

    dependencies {
        if (flutterEmbeddingJar == null || !flutterEmbeddingJar.exists()) {
            throw new GradleException("Flutter Android embedding not found. Run `flutter precache --android`, set FLUTTER_ROOT, or pass -Pflutter.sdk=/path/to/flutter.")
        }

        compileOnly(files(flutterEmbeddingJar))
        testImplementation(files(flutterEmbeddingJar))
        testImplementation("org.jetbrains.kotlin:kotlin-test")
        testImplementation("junit:junit:4.13.2")
        testImplementation("androidx.test:core:1.5.0")
        testImplementation("org.robolectric:robolectric:4.11.1")
    }

    testOptions {
        unitTests.includeAndroidResources = true

        unitTests.all {
            testLogging {
               events "passed", "skipped", "failed", "standardOut", "standardError"
               outputs.upToDateWhen {false}
               showStandardStreams = true
            }
        }
    }
}
